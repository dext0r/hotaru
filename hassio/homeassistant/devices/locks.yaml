automation:
  - id: front_door_locked
    alias: 'Front Door: Locked'
    mode: restart
    trigger:
      - platform: state
        entity_id: lock.front_door
        from: unlocked
        to: locked
    action:
      - service: script.turn_on
        entity_id: script.porch_lock_light_flash

      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.anyone_home
            to: 'off'
        timeout:
          minutes: 10
        continue_on_timeout: false

      - service: light.turn_off
        entity_id: group.home_lights
        continue_on_error: true

      - service: media_player.turn_off
        entity_id:
          - media_player.tv
          - media_player.bedroom_station
          - media_player.living_room_station
          - media_player.workshop_station
          - media_player.kitchen_station
        continue_on_error: true

  - id: front_door_unlocked
    alias: 'Front Door: Unlocked'
    trigger:
      - platform: state
        entity_id: lock.front_door
        from: locked
        to: unlocked
    action:
      - service: timer.start
        entity_id: timer.front_door_unlocked

  - id: front_door_unlock
    alias: 'Front Door: Unlock'
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id: sensor.intercom_status
        to: Door opened
    condition:
      - condition: state
        entity_id: lock.front_door
        state: locked

      - condition: state
        entity_id: input_boolean.scene_wait_guests
        state: 'on'
    action:
      - service: lock.unlock
        entity_id: lock.front_door

  - id: porch_door_unlock
    alias: 'Porch Door: Unlock'
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.intercom_status
        to: Door opened
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.anyone_near_home
            state: 'on'

          - condition: state
            entity_id: input_boolean.scene_wait_guests
            state: 'on'
    action:
      - service: lock.unlock
        entity_id: lock.porch_door

      - delay:
          minutes: 7

      - if:
          - condition: state
            entity_id: lock.porch_door
            state: unlocked

          - condition: state
            entity_id: binary_sensor.porch_door
            state: 'off'
        then:
          - service: lock.lock
            entity_id: lock.porch_door

  - id: porch_door_presence_unlock
    alias: 'Porch Door: Presence Unlock'
    mode: restart
    triggers:
      - trigger: state
        entity_id:
          - person.dextor
          - person.layma
        to: home
    conditions:
      - condition: state
        entity_id: lock.porch_door
        state: locked

      - condition: state
        entity_id: timer.anyone_near_home_recently
        state: active
    actions:
      - action: lock.unlock
        entity_id: lock.porch_door

      - delay:
          minutes: 3

      - if:
          - condition: state
            entity_id: lock.porch_door
            state: unlocked

          - condition: state
            entity_id: binary_sensor.porch_door
            state: 'off'
        then:
          - service: lock.lock
            entity_id: lock.porch_door

template:
  - lock:
      - unique_id: lock.front_door_vacation
        default_entity_id: lock.front_door_vacation
        name: Front Door Vacation
        state: >
          {{ is_state('binary_sensor.front_door_vacation_lock_contact', 'off') }}
        availability: >
          {{ states('binary_sensor.front_door_vacation_lock_contact') in ['on', 'off'] }}
        lock:
          action: none.none
        unlock:
          action: none.none

      - unique_id: lock.front_door
        default_entity_id: lock.front_door
        name: Front Door
        state: >
          {{ is_state('binary_sensor.front_door_lock_contact', 'off') }}
        availability: >
          {{ states('binary_sensor.front_door_lock_contact') in ['on', 'off'] }}
        lock:
          action: script.front_door_lock
        unlock:
          action: script.front_door_unlock

script:
  porch_lock_light_flash:
    alias: 'Porch Lock Light: Flash'
    max_exceeded: silent
    sequence:
      - service: light.turn_on
        entity_id: light.porch_lock_light
        data:
          brightness_pct: 100
          rgbw_color: [128, 0, 255, 0]
          transition: 1

      - delay:
          seconds: 1

      - service: light.turn_on
        entity_id: light.porch_lock_light
        data:
          effect: pulse

      - delay:
          minutes: 1  # из scene_departure_sequence

      - service: light.turn_off
        entity_id: light.porch_lock_light

  # замок не всегда управляется с первого раза :(
  # универсальный скрипт писать лень
  front_door_unlock:
    alias: 'Front Door: Unlock'
    max_exceeded: silent
    sequence:
      - repeat:
          count: 3
          sequence:
            - if:
                - condition: state
                  entity_id: lock.front_door
                  state: locked
              then:
                - service: lock.unlock
                  entity_id: lock.front_door_control

                - delay:
                    seconds: 15

      - if:
          - condition: state
            entity_id: lock.front_door
            state: locked
        then:
          - action: notify.send_message
            data:
              entity_id: notify.dextor
              message: 🪚 Замок не смог открыться :(

  front_door_lock:
    alias: 'Front Door: Lock'
    max_exceeded: silent
    sequence:
      - repeat:
          count: 3
          sequence:
            - if:
                - condition: state
                  entity_id: lock.front_door
                  state: unlocked
              then:
                - service: lock.lock
                  entity_id: lock.front_door_control

                - delay:
                    seconds: 25

      - if:
          - condition: state
            entity_id: lock.front_door
            state: unlocked
        then:
          - action: notify.send_message
            data:
              entity_id: notify.dextor
              message: 🪚 Замок не смог закрыться :(

timer:
  front_door_unlocked:
    name: 'Front Door: Unlocked'
    duration:
      minutes: 5
