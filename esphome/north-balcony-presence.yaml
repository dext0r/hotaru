packages:
  base: !include common/esp32.yaml
  esp32_ble_tracker: !include common/esp32_ble_tracker.yaml

esphome:
  friendly_name: North Balcony Presence
  area: North Balcony
  name: north-balcony-presence
  name_add_mac_suffix: false

binary_sensor:
  - name: Misaka
    platform: ble_presence
    irk: !secret misaka_irk
    timeout: 30s
    device_class: presence

  - name: Layma iPhone
    platform: ble_presence
    irk: !secret layma_iphone_irk
    timeout: 30s
    device_class: presence

switch:
  - name: LED
    platform: gpio
    pin: 2
    entity_category: diagnostic
    icon: mdi:led-outline
