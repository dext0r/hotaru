packages:
  base: !include common/esp32.yaml
  esp32_ble_tracker: !include common/esp32_ble_tracker.yaml
  tion_4s: !include common/tion_4s.yaml
  senseair_s8: !include common/senseair_s8.yaml
  restart: !include common/restart.yaml

substitutions:
  tion_device_id: intake_fan
  tion_mac_address: E1:73:74:77:82:1C
  senseair_s8_sensor_name: Workshop CO2
  senseair_s8_tx_pin: '17'
  senseair_s8_rx_pin: '16'

esphome:
  friendly_name: Workshop UBox
  area:
    id: workshop
    name: Workshop
  name: workshop-ubox
  model: Universal Box (ESP32)
  name_add_mac_suffix: false

  devices:
    - id: intake_fan
      name: Workshop Intake Fan
      area_id: workshop

esp32:
  framework:
    advanced:
      minimum_chip_revision: '1.0'

uart:
  - id: pm1006_uart
    rx_pin: 34
    baud_rate: 9600

sensor:
  - platform: pvvx_mithermometer
    mac_address: A4:C1:38:7D:60:67
    temperature:
      name: Workshop Temperature
      accuracy_decimals: 1
      filters:
        - round: 1
        - or:
          - throttle: 30min
          - delta: 0.2
        - timeout: 35min

    humidity:
      name: Workshop Humidity
      accuracy_decimals: 0
      filters:
        - round: 0
        - or:
          - throttle: 30min
          - delta: 2
        - timeout: 35min

    battery_level:
      name: Workshop Meteo Battery
      filters:
        - delta: 5

  - platform: pm1006
    uart_id: pm1006_uart
    pm_2_5:
      name: Workshop PM 2.5
      filters:
        - throttle_average: 5min
        - round: 0
