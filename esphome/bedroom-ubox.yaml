packages:
  base: !include common/esp32.yaml
  esp32_ble_tracker: !include common/esp32_ble_tracker.yaml
  tion_4s: !include common/tion_4s.yaml
  senseair_s8: !include common/senseair_s8.yaml
  restart: !include common/restart.yaml

substitutions:
  tion_device_id: intake_fan
  tion_mac_address: C2:EE:5F:88:7C:75
  senseair_s8_device_id: bedroom_meteo
  senseair_s8_tx_pin: '27'
  senseair_s8_rx_pin: '26'

esphome:
  friendly_name: Bedroom UBox
  area:
    id: bedroom
    name: Bedroom
  name: bedroom-ubox
  model: Universal Box (ESP32)
  name_add_mac_suffix: false

  areas:
    - id: bathroom
      name: Bathroom

    - id: wardrobe
      name: Wardrobe

  devices:
    - id: intake_fan
      name: Bedroom Intake Fan
      area_id: bedroom

    - id: bedroom_meteo
      name: Bedroom Meteo
      area_id: bedroom

    - id: bathroom_meteo
      name: Bathroom Meteo
      area_id: bathroom

    - id: wardrobe_meteo
      name: Wardrobe Meteo
      area_id: wardrobe

sensor:
  - platform: pvvx_mithermometer
    mac_address: A4:C1:38:FC:04:50
    temperature: &temperature
      name: Temperature
      device_id: bedroom_meteo
      accuracy_decimals: 1
      filters:
        - round: 1
        - or:
          - throttle: 30min
          - delta: 0.2
        - timeout: 35min

    humidity: &humidity
      name: Humidity
      device_id: bedroom_meteo
      accuracy_decimals: 0
      filters:
        - round: 0
        - or:
          - throttle: 30min
          - delta: 2
        - timeout: 35min

    battery_level: &battery_level
      name: Battery
      device_id: bedroom_meteo
      filters:
        - delta: 5

  # гардероб
  - platform: pvvx_mithermometer
    mac_address: A4:C1:38:A1:F8:D7
    temperature:
      device_id: wardrobe_meteo
      <<: *temperature
    humidity:
      device_id: wardrobe_meteo
      <<: *humidity
    battery_level:
      device_id: wardrobe_meteo
      <<: *battery_level

  # ванная
  - platform: pvvx_mithermometer
    mac_address: A4:C1:38:8A:62:0B
    temperature:
      device_id: bathroom_meteo
      <<: *temperature
    humidity:
      device_id: bathroom_meteo
      <<: *humidity
    battery_level:
      device_id: bathroom_meteo
      <<: *battery_level
