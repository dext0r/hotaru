input_number:
  home_target_humidity:
    name: 'Home: Target Humidity'
    icon: mdi:water-percent
    unit_of_measurement: '%'
    mode: slider
    min: 20
    max: 50
    step: 1

input_boolean:
  climate_control:
    name: 'Allow automatic climate control'
    initial: true
    icon: mdi:thermometer-auto

automation:
  - id: home_airing_turn_off
    alias: 'Home Airing: Turn off'
    trigger:
      - platform: state
        entity_id: switch.home_airing
        from: 'off'
        to: 'on'
        for:
          minutes: 20
    action:
      - service: switch.turn_off
        entity_id: switch.home_airing

  - id: climate_anomaly_alert
    alias: 'Climate: Anomaly alert'
    trigger:
      - platform: numeric_state
        entity_id:
          - sensor.bathroom_temperature
          - sensor.bedroom_temperature
          - sensor.kitchen_temperature
          - sensor.living_room_temperature
          - sensor.wardrobe_temperature
          - sensor.workshop_temperature
        below: 15

      - platform: numeric_state
        entity_id:
          - sensor.bathroom_temperature
          - sensor.bedroom_temperature
          - sensor.kitchen_temperature
          - sensor.living_room_temperature
          - sensor.wardrobe_temperature
          - sensor.workshop_temperature
        above: 29
    action:
      - action: notify.send_message
        data:
          entity_id: notify.dextor
          message: 🤨 Подозрительная температура в доме

  - id: living_room_hot
    alias: 'Living Room: Hot'
    trigger:
      - platform: event
        event_type: yandex_intent
        event_data:
          text: Очень жарко
          room: Гостиная
    action:
      - action: climate.set_temperature
        entity_id:
          - climate.bedroom_ac
          - climate.workshop_ac
        data:
          temperature: 22
          hvac_mode: cool

      - service: script.yandex_station_tts
        data:
          target: >
            {{ trigger.event.data.get('entity_id', 'last') }}
          text: Сейчас попробую тебя охладить

  - id: living_room_cold
    alias: 'Living Room: cold'
    trigger:
      - platform: event
        event_type: yandex_intent
        event_data:
          text: Я замёрз
          room: Гостиная
    action:
      - service: climate.turn_off
        entity_id:
          - climate.bedroom_ac
          - climate.workshop_ac

      - service: script.yandex_station_tts
        data:
          target: >
            {{ trigger.event.data.get('entity_id', 'last') }}
          text: Ну и ладно

template:
  - switch:
      - unique_id: switch.home_airing
        name: Home Airing
        icon: mdi:hair-dryer-outline
        state: >
          {{
            is_state('input_boolean.bedroom_airing_cold', 'on') and
            is_state('input_boolean.living_room_airing_cold', 'on') and
            is_state('input_boolean.workshop_airing_cold', 'on')
          }}
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id:
                - input_boolean.bedroom_airing_cold
                - input_boolean.living_room_airing_cold
                - input_boolean.workshop_airing_cold
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.bedroom_airing_cold
                - input_boolean.bedroom_airing_warm
                - input_boolean.living_room_airing_cold
                - input_boolean.living_room_airing_warm
                - input_boolean.workshop_airing_cold
                - input_boolean.workshop_airing_warm

  - sensor:
      - name: Outside Temperature
        unique_id: sensor.outside_temperature
        device_class: temperature
        unit_of_measurement: °C
        state: >
          {% set north_t, south_t = None, None %}
          {% set online_t = state_attr('weather.home', 'temperature') | int(None) %}

          {% if is_state('climate.bedroom_intake_fan', 'heat') or is_state('climate.bedroom_intake_fan', 'fan_only') %}
            {% if is_state('timer.bedroom_intake_fan_warming_up', 'idle') %}
              {% set north_t = states('sensor.bedroom_intake_fan_outdoor_temperature') | int(None) %}
            {% endif %}
          {% endif %}
          {% if is_state('climate.living_room_intake_fan', 'heat') or is_state('climate.living_room_intake_fan', 'fan_only') %}
            {% if is_state('timer.living_room_intake_fan_warming_up', 'idle') %}
              {% set south_t = states('sensor.living_room_intake_fan_outdoor_temperature') | int(None) %}
            {% endif %}
          {% endif %}

          {% set t = [north_t, south_t] | reject('none') | min %}
          {% if t is undefined %}
            {% set t = online_t %}
          {% endif %}

          {% if t is none %}
            unknown
          {% else %}
            {{ t }}
          {% endif %}
