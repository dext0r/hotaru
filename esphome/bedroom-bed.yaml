packages:
  base: !include common/esp8266.yaml

esphome:
  friendly_name: Bedroom Bed
  area: Bedroom
  name: bedroom-bed
  model: NodeMCU
  name_add_mac_suffix: false

  on_boot:
    - binary_sensor.template.publish:
        id: occupancy
        state: off

  areas:
    - id: hallway
      name: Hallway

  devices:
    - id: hallway_path_light
      name: Hallway Path Light
      area_id: hallway

logger:
  logs:
    ads1115.sensor: INFO

i2c:
  scl: 5
  sda: 4
  scan: false

ads1115:
  - address: 0x48

sensor:
  - id: bed_a0
    name: 'Bed: A0'
    platform: ads1115
    multiplexer: A0_GND
    gain: 6.144
    update_interval: 250ms
    unit_of_measurement: ''
    accuracy_decimals: 0
    internal: true
    filters:
      - multiply: 10000
      - offset: 50
      - exponential_moving_average:
          alpha: 0.3
          send_every: 12
          send_first_at: 6
      - lambda: return int(x);
    on_value:
      - if:
          condition:
            lambda: return x >= 110;
          then:
            - script.execute: reset_occupancy
            - binary_sensor.template.publish:
                id: occupancy
                state: on

  - id: bed_a1
    name: 'Bed: A1'
    platform: ads1115
    multiplexer: A1_GND
    gain: 6.144
    update_interval: 250ms
    unit_of_measurement: ''
    accuracy_decimals: 0
    internal: true
    filters:
      - multiply: 10000
      - offset: 50
      - exponential_moving_average:
          alpha: 0.3
          send_every: 12
          send_first_at: 6
      - lambda: return int(x);
    on_value:
      - if:
          condition:
            lambda: return x >= 110;
          then:
            - script.execute: reset_occupancy
            - binary_sensor.template.publish:
                id: occupancy
                state: on

binary_sensor:
  - id: occupancy
    name: Occupancy
    platform: template
    device_class: occupancy
    lambda: return {};

script:
  - id: reset_occupancy
    mode: restart
    then:
      - delay: 60s
      - binary_sensor.template.publish:
          id: occupancy
          state: off

light:
  - name: ''
    platform: neopixelbus
    pin: 14
    device_id: hallway_path_light
    type: GRBW
    variant: SK6812
    num_leds: 104
    gamma_correct: 1
    restore_mode: ALWAYS_OFF
