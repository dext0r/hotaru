packages:
  base: !include common/esp8266.yaml
  energy: !include common/energy.yaml

esphome:
  friendly_name: Living Room Media Socket
  area: Living Room
  name: living-room-media-socket
  model: Lellki WK34
  name_add_mac_suffix: false

esp8266:
  board: esp8285

preferences:
  flash_write_interval: 10min

logger:
  baud_rate: 0

binary_sensor:
  - id: button
    platform: gpio
    internal: true
    pin: 3
    on_press:
      then:
        switch.toggle: relay

sensor:
  - platform: hlw8012
    sel_pin:
      number: 13
      inverted: true
    cf_pin: 12
    cf1_pin: 14
    model: BL0937
    current_resistor: 0.001
    voltage_divider: 1890
    initial_mode: VOLTAGE
    change_mode_every: 4294967295
    update_interval: 5s

    voltage:
      name: Voltage
      disabled_by_default: true
      accuracy_decimals: 0
      filters:
        - round: 0

    power:
      id: power
      name: Power
      accuracy_decimals: 0
      filters:
        - round: 0
        - timeout: 15s
      on_value:
        - sensor.template.publish:
            id: power_adj
            state: !lambda return x;

status_led:
  pin:
    number: 4
    inverted: true

switch:
  - id: relay
    platform: gpio
    name: ''
    device_class: outlet
    pin: 5
    restore_mode: RESTORE_DEFAULT_OFF
