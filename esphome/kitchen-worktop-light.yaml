packages:
  base: !include common/esp8266.yaml
  energy: !include common/energy.yaml

esphome:
  friendly_name: Kitchen Worktop Light
  area: Kitchen
  name: kitchen-worktop-light
  model: H801 LED Dimmer
  name_add_mac_suffix: false
  on_boot:
    - switch.turn_off: led_green

light:
  - id: light_w1
    platform: monochromatic
    name: Right
    output: pwm_w1
    default_transition_length: 700ms

  - id: light_w2
    platform: monochromatic
    name: Left
    output: pwm_w2
    default_transition_length: 700ms

output:
  - id: pwm_b
    platform: esp8266_pwm
    pin: 12

  - id: pwm_g
    platform: esp8266_pwm
    pin: 13

  - id: pwm_r
    platform: esp8266_pwm
    pin: 15

  - id: pwm_w1
    platform: esp8266_pwm
    pin: 14

  - id: pwm_w2
    platform: esp8266_pwm
    pin: 04

switch:
  - id: led_green
    platform: gpio
    internal: true
    pin:
      number: 1
      inverted: true

sensor:
  - id: power_w1
    platform: template
    update_interval: 1s
    unit_of_measurement: W
    lambda: |-
      if (!id(light_w1).remote_values.get_state()) {
        return 0;
      }

      return id(light_w1).remote_values.get_brightness() * 100;
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 0.0 -> 0
            - 20.0 -> 0.34
            - 30.0 -> 0.90
            - 40.0 -> 2.00
            - 50.0 -> 3.90
            - 60.0 -> 6.22
            - 70.0 -> 9.45
            - 80.0 -> 14.0
            - 90.0 -> 19.70
            - 100.0 -> 26.50
      - clamp:
          min_value: 0

  - id: power_w2
    platform: template
    update_interval: 1s
    unit_of_measurement: W
    lambda: |-
      if (!id(light_w2).remote_values.get_state()) {
        return 0;
      }

      return id(light_w2).remote_values.get_brightness() * 100;
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 0.0 -> 0
            - 20.0 -> 0.11
            - 40.0 -> 0.65
            - 50.0 -> 1.27
            - 60.0 -> 2.05
            - 70.0 -> 3.10
            - 80.0 -> 4.55
            - 90.0 -> 6.40
            - 100.0 -> 8.55
      - clamp:
          min_value: 0

  - id: power_raw
    platform: combination
    type: sum
    sources:
      - source: power_w1
      - source: power_w2
    unit_of_measurement: W
    filters:
      - offset: 1.2 # standby
    on_value:
      - lambda: |-
          id(power_avg).publish_state(x);
          id(power_adj).publish_state(x);

status_led:
  pin:
    number: 5
    inverted: true
