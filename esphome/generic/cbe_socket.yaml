packages:
  base: !include ../common/esp8266.yaml

substitutions:
  relay_restore_mode: ALWAYS_OFF

esphome:
  name: cbe-socket
  model: CBE Socket

esp8266:
  board: esp8285
  restore_from_flash: yes

preferences:
  flash_write_interval: 10min

binary_sensor:
  - id: button
    platform: gpio
    internal: true
    pin:
      number: 3
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      then:
        switch.toggle: relay

sensor:
  - platform: hlw8012
    sel_pin:
      number: 12
      inverted: True
    cf_pin: 4
    cf1_pin: 5
    current_resistor: 0.0022
    voltage_divider: 805
    initial_mode: VOLTAGE
    change_mode_every: 4294967295
    update_interval: 5s

    voltage:
      name: Voltage
      disabled_by_default: true
      accuracy_decimals: 0
      filters:
        - round: 0

    power:
      id: power
      name: Power
      accuracy_decimals: 0
      filters:
        - lambda: |-
            if (x < 1.5) return 0;
            return x - 1.5;

  - platform: total_daily_energy
    name: $device_name Energy
    device_class: energy
    unit_of_measurement: kWh
    accuracy_decimals: 2
    power_id: power
    filters:
      - multiply: 0.001

status_led:
  pin:
    number: 13

switch:
  - id: relay
    platform: gpio
    name: Socket
    device_class: outlet
    pin: 14
    restore_mode: $relay_restore_mode
