packages:
  base: !include common/esp8266.yaml

esphome:
  friendly_name: Hotaru Power
  area: Comms
  name: hotaru-power
  model: Sonoff Basic R2
  name_add_mac_suffix: false

api:
  encryption:
    key: !secret hotaru_power_key

esp8266:
  board: esp8285

logger:
  baud_rate: 0

binary_sensor:
  - id: button
    platform: gpio
    internal: true
    pin:
      number: 0
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 5s
    on_press:
      then:
        switch.toggle: relay

switch:
  - id: relay
    platform: gpio
    pin: 12
    name: ''
    restore_mode: ALWAYS_ON

output:
  - id: status_led
    platform: gpio
    pin: 13
    inverted: true

web_server:
  local: true
  auth:
    username: admin
    password: !secret hotaru_power_password
