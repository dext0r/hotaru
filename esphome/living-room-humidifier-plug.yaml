packages:
  base: !include generic/bsd33_ln882h_plug.yaml

substitutions:
  relay_restore_mode: RESTORE_DEFAULT_ON
  power_led: 'false'
  bl0937_current_resistor: 0.00101
  bl0937_voltage_divider: 1510.5

esphome:
  friendly_name: Living Room Humidifier Plug
  area: Living Room
  name: living-room-humidifier-plug
  name_add_mac_suffix: false

api:
  on_client_disconnected:
    - script.execute: relay_turn_off

script:
  - id: relay_turn_off
    mode: restart
    then:
      - delay: 10min
      - if:
          condition:
            not:
              api.connected:
          then:
            - switch.turn_off: relay
