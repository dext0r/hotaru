# https://github.com/athom-tech/athom-configs/blob/main/athom-wall-outlet.yaml
packages:
  base: !include ../common/esp8266.yaml
  energy: !include ../common/energy.yaml

substitutions:
  relay_restore_mode: ALWAYS_OFF

esphome:
  name: athom-wall-outlet
  model: Athom Wall Outlet
  on_boot:
    priority: -100.0
    then:
      - if:
          condition:
            - switch.is_on: relay
          then:
            - light.turn_on: button_led

esp8266:
  board: esp8285

logger:
  baud_rate: 0

uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

binary_sensor:
  - id: button
    platform: gpio
    internal: true
    pin:
      number: 5
    on_press:
      then:
        switch.toggle: relay

sensor:
  - platform: cse7766
    voltage:
      name: Voltage
      internal: true
      disabled_by_default: true
      accuracy_decimals: 0
      filters:
        - throttle_average: 5s

    power:
      id: power_raw
      internal: true
      filters:
        - throttle_average: 1s
        - timeout: 15s
      on_value:
        - lambda: |-
            id(power_avg).publish_state(x);
            id(power_adj).publish_state(x);

light:
  - id: button_led
    platform: status_led
    internal: true
    pin:
      number: 13
      inverted: true

switch:
  - id: relay
    name: ''
    platform: gpio
    pin: 12
    device_class: outlet
    restore_mode: $relay_restore_mode
    on_turn_on:
      - light.turn_on: button_led
    on_turn_off:
      - light.turn_off: button_led
