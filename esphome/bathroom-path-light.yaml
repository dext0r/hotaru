packages:
  base: !include common/esp8266.yaml

esphome:
  friendly_name: Bathroom Path Light
  area: Bathroom
  name: bathroom-path-light
  model: Wemos
  name_add_mac_suffix: false

light:
  - name: Toilet
    platform: neopixelbus
    pin: 14
    type: GRBW
    variant: SK6812
    num_leds: 27
    gamma_correct: 1
    restore_mode: ALWAYS_OFF

  - name: Sink
    platform: neopixelbus
    pin: 12
    type: GRBW
    variant: SK6812
    num_leds: 31
    gamma_correct: 1
    restore_mode: ALWAYS_OFF
