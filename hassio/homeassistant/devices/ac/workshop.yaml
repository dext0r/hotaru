automation:
  - id: workshop_ac_turn_off
    alias: 'Workshop AC: Turn off'
    trigger:
      - platform: state
        entity_id: binary_sensor.anyone_home
        from: 'on'
        to: 'off'
        for:
          minutes: 40

      - platform: state
        entity_id: input_boolean.scene_sleepy_mood
        from: 'off'
        to: 'on'

      - platform: state
        entity_id: input_select.home_mode
        from: Day

      - platform: state
        entity_id: climate.workshop_ac
        to:
          - heat_cool
          - cool
          - heat
          - dry
        for:
          hours: 12

      - platform: numeric_state
        entity_id: sensor.cb_power_supply_power
        above: 3600
    condition:
      - condition: state
        entity_id: climate.workshop_ac
        state:
          - heat_cool
          - cool
          - heat
          - dry
    action:
      - service: climate.turn_off
        entity_id: climate.workshop_ac

  - id: workshop_ac_turn_off_protect
    alias: 'Workshop AC: Turn off (protect)'
    trigger:
      - platform: time_pattern
        seconds: /30

      - platform: state
        entity_id:
          - climate.workshop_ac
          - input_select.washing_machine_status
    condition:
      - condition: or
        conditions:
          - and:
            - condition: state
              entity_id: input_select.washing_machine_status
              state: Running

            - condition: state
              entity_id: climate.bedroom_ac
              state:
                - heat_cool
                - cool
                - heat
                - dry

          - condition: numeric_state
            entity_id: sensor.outside_temperature
            below: -15

      - condition: state
        entity_id: climate.workshop_ac
        state:
          - heat_cool
          - cool
          - heat
          - dry
    action:
      - service: climate.turn_off
        entity_id: climate.workshop_ac

template:
  - binary_sensor:
      - unique_id: binary_sensor.workshop_ac_running
        name: 'Workshop AC Running'
        icon: mdi:play
        state: >
          {{ not is_state('climate.workshop_ac', 'off') }}
        availability: >
          {{ is_state('climate.workshop_ac', ['heat_cool', 'cool', 'heat', 'fan_only', 'dry', 'off']) }}
