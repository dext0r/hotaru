packages:
  base: !include common/esp8266.yaml
  energy: !include common/energy.yaml

esphome:
  friendly_name: Living Room Media Socket
  area: Living Room
  name: living-room-media-socket
  model: Lellki WK34
  name_add_mac_suffix: false

esp8266:
  board: esp8285

logger:
  baud_rate: 0

binary_sensor:
  - id: button
    platform: gpio
    pin: 3
    internal: true

sensor:
  - platform: hlw8012
    sel_pin:
      number: 13
      inverted: true
    cf_pin: 12
    cf1_pin: 14
    model: BL0937
    current_resistor: 0.001
    voltage_divider: 1890
    initial_mode: VOLTAGE
    change_mode_every: never
    update_interval: 1s

    voltage:
      name: Voltage
      disabled_by_default: true
      internal: true
      accuracy_decimals: 0
      filters:
        - round: 0

    power:
      id: power_raw
      filters:
        - timeout: 15s
      on_value:
        - lambda: |-
            id(power_avg).publish_state(x);
            id(power_adj).publish_state(x);

status_led:
  pin:
    number: 4
    inverted: true

switch:
  - id: relay
    platform: gpio
    pin: 5
    name: ''
    device_class: outlet
    restore_mode: ALWAYS_ON
