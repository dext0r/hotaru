esphome:
  on_boot:
    - delay: 10s
    - senseair.abc_disable: senseair_s8

uart:
  - id: senseair_s8_uart
    rx_pin: $senseair_s8_rx_pin
    tx_pin: $senseair_s8_tx_pin
    baud_rate: 9600

sensor:
  - id: senseair_s8
    platform: senseair
    uart_id: senseair_s8_uart
    update_interval: 30s
    co2:
      name: CO2
      device_id: $senseair_s8_device_id
      filters:
        - round_to_multiple_of: 5
        - or:
            - throttle: 5min
            - delta: 15
        - timeout: 5min

button:
  - name: CO2 Calibrate
    platform: template
    device_id: $senseair_s8_device_id
    disabled_by_default: true
    on_press:
      - senseair.background_calibration: senseair_s8
      - delay: 1min
      - senseair.background_calibration_result: senseair_s8
