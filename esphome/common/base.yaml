esphome:
  name_add_mac_suffix: true
  min_version: 2026.2.0

external_components:
  - source: lib

api:
  reboot_timeout: 60min

captive_portal:

logger:
  level: DEBUG

ota:
  - id: ota_esphome
    platform: esphome
    password: !secret password

safe_mode:
  num_attempts: 5

preferences:
  flash_write_interval: 3min

time:
  - platform: homeassistant
    timezone: Europe/Moscow
    on_time_sync:
      then:
        - logger.log: Synchronized system clock

wifi:
  ssid: !secret ssid
  password: !secret password
  reboot_timeout: 30min
  fast_connect: true
  ap:
    password: !secret password
    ap_timeout: 1min

sensor:
  - platform: uptime
    name: Boot Time
    type: timestamp

  - platform: uptime
    name: Uptime
    update_interval: 45s
    internal: true
