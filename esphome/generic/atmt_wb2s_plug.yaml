packages:
  base: !include ../common/base.yaml
  bl0937: !include ../common/bl0937.yaml

substitutions:
  relay_restore_mode: RESTORE_DEFAULT_OFF
  bl0937_sel_pin: P26
  bl0937_sel_pin_inverted: 'true'
  bl0937_cf_pin: P8
  bl0937_cf_pin_inverted: 'true'
  bl0937_cf1_pin: P7
  bl0937_cf1_pin_inverted: 'true'
  bl0937_current_resistor: 0.00104
  bl0937_voltage_divider: 818.68

esphome:
  friendly_name: ATMT Smart Plug
  name: atmt-plug
  model: ATMT Smart Plug (WB2S)

bk72xx:
  board: wb2s

logger:
  baud_rate: 0

binary_sensor:
  - id: push_button
    platform: gpio
    pin:
      number: P24
      inverted: true
    on_press:
      switch.toggle: relay

status_led:
  pin:
    number: P23
    inverted: true

switch:
  - id: relay
    name: ''
    platform: gpio
    pin: P6
    device_class: outlet
    restore_mode: $relay_restore_mode
