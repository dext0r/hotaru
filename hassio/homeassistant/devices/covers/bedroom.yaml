template:
  - cover:
      - unique_id: bedroom_shades
        default_entity_id: cover.bedroom
        name: Bedroom Shades
        device_class: shade
        optimistic: false
        position: >
          {{ state_attr('cover.bedroom_shades_motor', 'current_position') }}
        availability: >
          {{ states('cover.bedroom_shades_motor') not in ['unknown', 'unavailable'] }}
        set_cover_position:
          if:
            - condition: state
              entity_id: binary_sensor.bedroom_window
              state: 'off'
          then:
            - action: cover.set_cover_position
              entity_id: cover.bedroom_shades_motor
              data:
                position: '{{ position }}'
        stop_cover:
          action: cover.stop_cover
          entity_id: cover.bedroom_shades_motor
