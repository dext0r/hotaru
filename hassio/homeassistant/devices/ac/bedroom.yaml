automation:
  - id: bedroom_ac_display_turn_off
    alias: 'Bedroom AC Display: Turn off'
    trigger:
      - platform: state
        entity_id: input_select.home_mode
        to: Night

      - platform: state
        entity_id: climate.bedroom_ac
        from: 'off'
    condition:
      - condition: state
        entity_id: input_select.home_mode
        state: Night

      - condition: state
        entity_id: climate.bedroom_ac
        state:
          - heat_cool
          - cool
          - heat
          - dry
    action:
      - delay:
          seconds: 2

      - condition: state
        entity_id: switch.bedroom_ac_display
        state: 'on'

      - service: switch.turn_off
        entity_id: switch.bedroom_ac_display

  - id: bedroom_ac_turn_off
    alias: 'Bedroom AC: Turn off'
    trigger:
      - platform: state
        entity_id: binary_sensor.anyone_home
        from: 'on'
        to: 'off'
        for:
          minutes: 20

      - platform: state
        entity_id: climate.bedroom_ac
        to:
          - heat_cool
          - cool
          - heat
          - dry
        for:
          hours: 24

      - platform: state
        entity_id: input_select.home_mode
        from: Night
        for:
          minutes: 5

      - platform: numeric_state
        entity_id: sensor.cb_power_supply_power
        above: 3600
    condition:
      - condition: state
        entity_id: climate.bedroom_ac
        state:
          - heat_cool
          - cool
          - heat
          - dry
    action:
      - service: climate.turn_off
        entity_id: climate.bedroom_ac

  - id: bedroom_ac_display_update
    alias: 'Bedroom AC Display: Update'
    trigger:
      - id: 'on'
        platform: state
        entity_id: climate.bedroom_ac
        from: 'off'
        to:
          - heat_cool
          - cool
          - heat
          - dry

      - id: 'off'
        platform: state
        entity_id: climate.bedroom_ac
        from:
          - heat_cool
          - cool
          - heat
          - dry
        to: 'off'
    action:
      - if:
          - condition: trigger
            id: 'on'
        then:
          - service: input_boolean.turn_on
            entity_id: input_boolean.bedroom_ac_display
        else:
          - service: input_boolean.turn_off
            entity_id: input_boolean.bedroom_ac_display

  - id: bedroom_ac_turn_off_protect
    alias: 'Bedroom AC: Turn off (protect)'
    trigger:
      - platform: time_pattern
        seconds: /30

      - platform: state
        entity_id:
          - climate.bedroom_ac
          - input_select.washing_machine_status
    condition:
      - condition: or
        conditions:
          - and:
              - condition: state
                entity_id: input_select.washing_machine_status
                state: Running

              - condition: state
                entity_id: climate.workshop_ac
                state:
                  - heat_cool
                  - cool
                  - heat
                  - dry

          - condition: numeric_state
            entity_id: sensor.outside_temperature
            below: -15

      - condition: state
        entity_id: climate.bedroom_ac
        state:
          - heat_cool
          - cool
          - heat
          - dry
    action:
      - service: climate.turn_off
        entity_id: climate.bedroom_ac

template:
  - switch:
      - unique_id: switch.bedroom_ac_display
        name: 'Bedroom AC: Display'
        icon: mdi:camera-control
        state: >
          {{ is_state('input_boolean.bedroom_ac_display', 'on') }}
        turn_on:
          - if:
              - condition: state
                entity_id: climate.bedroom_ac
                state:
                  - heat_cool
                  - cool
                  - heat
                  - dry
            then:
              - action: input_boolean.turn_on
                entity_id: input_boolean.bedroom_ac_display

              - action: button.press
                entity_id: button.bedroom_ac_display_toggle
        turn_off:
          parallel:
            - action: input_boolean.turn_off
              entity_id: input_boolean.bedroom_ac_display

            - action: button.press
              entity_id: button.bedroom_ac_display_toggle

  - binary_sensor:
      - unique_id: binary_sensor.bedroom_ac_running
        name: 'Bedroom AC Running'
        icon: mdi:play
        state: >
          {{ not is_state('climate.bedroom_ac', 'off') }}
        availability: >
          {{ is_state('climate.bedroom_ac', ['heat_cool', 'cool', 'heat', 'fan_only', 'dry', 'off']) }}

input_boolean:
  bedroom_ac_display:
    name: 'Bedroom AC: Display'
    icon: mdi:camera-control
