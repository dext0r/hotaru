packages:
  base: !include common/esp32.yaml
  esp32_ble_tracker: !include common/esp32_ble_tracker.yaml
  tion_4s: !include common/tion_4s.yaml
  senseair_s8: !include common/senseair_s8.yaml
  restart: !include common/restart.yaml

substitutions:
  tion_device_id: intake_fan
  tion_mac_address: F2:71:3F:8E:FC:38
  senseair_s8_sensor_name: Living Room CO2
  senseair_s8_tx_pin: '1'
  senseair_s8_rx_pin: '3'

esphome:
  friendly_name: Living Room UBox
  area:
    id: living_room
    name: Living Room
  name: living-room-ubox
  model: Universal Box (ESP32)
  name_add_mac_suffix: false

  devices:
    - id: intake_fan
      name: Living Room Intake Fan
      area_id: living_room

esp32:
  framework:
    advanced:
      minimum_chip_revision: '1.0'

logger:
  baud_rate: 0

uart:
  - id: ld2410_uart
    rx_pin: 17
    tx_pin: 16
    baud_rate: 256000
    parity: NONE
    stop_bits: 1

  - id: pmsx003_uart
    tx_pin: 26
    rx_pin: 27
    baud_rate: 9600

ld2410:
  uart_id: ld2410_uart
  # duration: 45
  # range: 4.5m
  # motion: 100 100 90 100 100 100 100
  # static: 100 100 30 010 010 025 100

binary_sensor:
  - platform: ld2410
    has_target:
      name: Living Room Occupancy
      icon: ''

  - name: Misaka Living Room Presence
    platform: ble_presence
    irk: !secret misaka_irk
    timeout: 30s
    device_class: presence

  - name: Layma iPhone Living Room Presence
    platform: ble_presence
    irk: !secret layma_iphone_irk
    timeout: 30s
    device_class: presence

light:
  - name: Living Room TV Status Light Left
    platform: partition
    segments:
      - id: status_led_strip
        from: 0
        to: 3
    gamma_correct: 1

  - name: Living Room TV Status Light Right
    platform: partition
    segments:
      - id: status_led_strip
        from: 4
        to: 7
    gamma_correct: 1

  - id: status_led_strip
    platform: esp32_rmt_led_strip
    chipset: ws2812
    pin: 32
    num_leds: 8
    rgb_order: GRB

sensor:
  - platform: pmsx003
    type: PMSX003
    uart_id: pmsx003_uart
    update_interval: 3min
    pm_1_0:
      name: Living Room PM 1.0
    pm_2_5:
      name: Living Room PM 2.5
    pm_10_0:
      name: Living Room PM 10.0

  - platform: pvvx_mithermometer
    mac_address: A4:C1:38:42:B7:5D
    temperature: &temperature
      name: Living Room Temperature
      accuracy_decimals: 1
      filters:
        - round: 1
        - or:
          - throttle: 30min
          - delta: 0.2
        - timeout: 35min

    humidity: &humidity
      name: Living Room Humidity
      accuracy_decimals: 0
      filters:
        - round: 0
        - or:
          - throttle: 30min
          - delta: 2
        - timeout: 35min

    battery_level: &battery_level
      name: Living Room Meteo Battery
      filters:
        - delta: 5

  - platform: pvvx_mithermometer
    mac_address: A4:C1:38:B2:CD:CC
    temperature:
      name: Server Room Temperature
      <<: *temperature
    humidity:
      name: Server Room Humidity
      <<: *humidity
    battery_level:
      name: Server Room Meteo Battery
      <<: *battery_level

switch:
  - platform: ld2410
    bluetooth:
      name: Living Room LD2410 Bluetooth
      disabled_by_default: true
