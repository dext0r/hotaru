packages:
  base: !include ../common/esp8266.yaml

substitutions:
  relay_restore_mode: ALWAYS_OFF

esphome:
  name: sonoff-mini
  model: Sonoff Mini

esp8266:
  board: esp8285

logger:
  baud_rate: 0

binary_sensor:
  - id: button
    platform: gpio
    pin:
      number: 4
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      switch.toggle: relay

switch:
  - id: relay
    platform: gpio
    pin: 12
    name: ''
    restore_mode: $relay_restore_mode

output:
  - id: status_led
    platform: gpio
    pin: 13
    inverted: true
